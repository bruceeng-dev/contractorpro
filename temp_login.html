<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="brand">ContractorPro</h1>
        <p class="muted">Sign in to manage your construction business</p>
      </div>
      
      
        
      
      
      <form action="/login" method="POST" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      
      <div class="auth-footer">
        <p class="muted sm">Don't have an account? <a href="/register" class="link">Register here</a></p>
      </div>
    </div>
  </div>

  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      padding: 20px;
    }
    
    .auth-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-header .brand {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group label {
      font-weight: 600;
      color: var(--text);
    }
    
    .form-group input {
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      transition: border-color 0.2s ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .btn-full {
      width: 100%;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .flash-messages {
      margin-bottom: 20px;
    }
  </style>
</body>
</html>
